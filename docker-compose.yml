# הרצת הסביבה המקומית: DB + Backend API.
# הרצה: docker compose up --build
# (ה-Frontend ב-prayers-app/ רץ בנפרד עם Expo — ראה prayers-app/README.md)

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: prayers_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/prayers_db
      FRONTEND_URL: http://localhost:8081
      # TODO: STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET / FIREBASE_CREDENTIALS
    depends_on:
      - db
    ports:
      - '8000:8000'

volumes:
  pgdata:
