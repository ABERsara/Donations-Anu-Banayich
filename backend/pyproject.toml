[tool.ruff]
# מקביל ל-Prettier בצד ה-frontend: עיצוב + לינט בכלי אחד
line-length = 100
target-version = "py312"
exclude = [".venv", "alembic/versions"]

[tool.ruff.lint]
# E/W = pycodestyle, F = pyflakes, I = isort, UP = pyupgrade, B = bugbear
select = ["E", "W", "F", "I", "UP", "B"]
ignore = ["E501"]  # אורך שורה מטופל ע"י ה-formatter

[tool.ruff.lint.flake8-bugbear]
# ב-FastAPI, Depends()/Query()/... בערכי ברירת מחדל הם התבנית התקנית — לא באג (B008)
extend-immutable-calls = [
  "fastapi.Depends",
  "fastapi.Query",
  "fastapi.Path",
  "fastapi.Body",
  "fastapi.Header",
  "fastapi.Cookie",
  "fastapi.Form",
  "fastapi.File",
  "fastapi.Security",
]

[tool.ruff.format]
quote-style = "double"
